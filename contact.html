<section class="page-header">
  <div class="container">
    <p class="section-label reveal">联系</p>
    <h1 class="page-title reveal">有话想说？<br>随时联系我</h1>
    <p class="page-sub reveal" style="transition-delay:0.1s">无论是合作、交流还是单纯想聊聊，都欢迎联系我。</p>
  </div>
</section>

<section class="section">
  <div class="container">
    <div class="contact-grid">
      <div class="contact-info reveal">
        <div class="contact-block">
          <h3 class="contact-block-title">邮箱</h3>
          <a href="mailto:hello@pintan.cloud" class="contact-link">hello@pintan.cloud</a>
        </div>
        <div class="contact-block">
          <h3 class="contact-block-title">GitHub</h3>
          <a href="https://github.com/CianLaw" target="_blank" class="contact-link">CianLaw</a>
        </div>
      </div>
      <form class="contact-form reveal" style="transition-delay:0.1s">
        <div class="form-group">
          <label for="name">你的名字</label>
          <input type="text" id="name" name="name" placeholder="请输入你的名字" required>
        </div>
        <div class="form-group">
          <label for="email">邮箱地址</label>
          <input type="email" id="email" name="email" placeholder="请输入邮箱地址" required>
        </div>
        <div class="form-group">
          <label for="message">想说的话</label>
          <textarea id="message" name="message" rows="5" placeholder="请输入你想说的内容..." required></textarea>
        </div>
        <button type="submit" class="btn">发送消息 <span class="arrow"></span></button>
      </form>
    </div>
  </div>
</section>
